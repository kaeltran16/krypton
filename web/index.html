<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080c12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Krypton</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Krypton" />
    <link rel="apple-touch-startup-image" href="/apple-splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-828x1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1206x2622.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1320x2868.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/apple-splash-1080x2340.png" media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Splash screen – visible before React mounts, then faded out by App -->
      <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080c12;overflow:hidden;transition:opacity .4s ease-out">
        <!-- Candlestick background — subtle, lower portion -->
        <svg style="position:absolute;bottom:15%;left:50%;transform:translateX(-50%);width:85%;max-width:380px;opacity:.07" viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#69daff" stop-opacity=".6"/><stop offset="1" stop-color="#69daff" stop-opacity="0"/></linearGradient>
          </defs>
          <line x1="30" y1="165" x2="30" y2="105" stroke="#2DD4A0" stroke-width="1.2"/><rect x="26" y="120" width="8" height="32" rx="1" fill="#2DD4A0"/>
          <line x1="70" y1="155" x2="70" y2="85" stroke="#2DD4A0" stroke-width="1.2"/><rect x="66" y="98" width="8" height="40" rx="1" fill="#2DD4A0"/>
          <line x1="110" y1="140" x2="110" y2="72" stroke="#2DD4A0" stroke-width="1.2"/><rect x="106" y="85" width="8" height="36" rx="1" fill="#2DD4A0"/>
          <line x1="150" y1="135" x2="150" y2="82" stroke="#FB7185" stroke-width="1.2"/><rect x="146" y="88" width="8" height="26" rx="1" fill="#FB7185"/>
          <line x1="190" y1="120" x2="190" y2="48" stroke="#2DD4A0" stroke-width="1.2"/><rect x="186" y="58" width="8" height="46" rx="1" fill="#2DD4A0"/>
          <line x1="230" y1="105" x2="230" y2="32" stroke="#2DD4A0" stroke-width="1.2"/><rect x="226" y="42" width="8" height="42" rx="1" fill="#2DD4A0"/>
          <line x1="270" y1="115" x2="270" y2="52" stroke="#FB7185" stroke-width="1.2"/><rect x="266" y="58" width="8" height="30" rx="1" fill="#FB7185"/>
          <line x1="310" y1="92" x2="310" y2="22" stroke="#2DD4A0" stroke-width="1.2"/><rect x="306" y="32" width="8" height="40" rx="1" fill="#2DD4A0"/>
          <line x1="350" y1="80" x2="350" y2="15" stroke="#2DD4A0" stroke-width="1.2"/><rect x="346" y="22" width="8" height="38" rx="1" fill="#2DD4A0"/>
          <polyline points="30,132 70,112 110,95 150,100 190,72 230,55 270,68 310,48 350,35" fill="none" stroke="url(#cg)" stroke-width="1.5"/>
        </svg>
        <!-- Radial glow behind logo -->
        <div style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;background:radial-gradient(circle,rgba(105,218,255,.1) 0%,transparent 65%);pointer-events:none"></div>
        <!-- Glowing K logo -->
        <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:relative;filter:drop-shadow(0 0 24px rgba(105,218,255,.6)) drop-shadow(0 0 60px rgba(105,218,255,.2));margin-bottom:32px">
          <line x1="36" y1="22" x2="36" y2="98" stroke="#69daff" stroke-width="5" stroke-linecap="round"/>
          <line x1="36" y1="60" x2="82" y2="22" stroke="#69daff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="36" y1="60" x2="82" y2="98" stroke="#69daff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="26" y1="60" x2="94" y2="60" stroke="#69daff" stroke-width="1.5" stroke-opacity=".3"/>
        </svg>
        <!-- KRYPTON text -->
        <span style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:500;letter-spacing:10px;color:#69daff;opacity:.85;position:relative">KRYPTON</span>
        <style>#splash.hide{opacity:0;pointer-events:none}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
